<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>电视选购 1.0</title>
  <style>
    :root{--bg:#0b1220;--text:#e5e7eb;--muted:#94a3b8;--border:rgba(148,163,184,.18);--accent:#60a5fa;--accent2:#34d399;--shadow:0 12px 30px rgba(0,0,0,.35);--radius:14px;}
    *{box-sizing:border-box}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      background:radial-gradient(1200px 600px at 20% 0%, rgba(96,165,250,.25), transparent 60%),
                 radial-gradient(1000px 500px at 90% 10%, rgba(52,211,153,.18), transparent 55%), var(--bg);
      color:var(--text);}
    .wrap{max-width:980px;margin:28px auto;padding:0 16px;}
    .header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:14px;}
    .title{font-size:28px;font-weight:800;letter-spacing:.5px;margin:0;}
    .subtitle{margin:6px 0 0 0;color:var(--muted);font-size:13px;line-height:1.4;}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:rgba(15,23,42,.6);color:var(--muted);font-size:12px;white-space:nowrap;}

    .layout{
      height:calc(100vh - 120px);
      min-height:520px;
      background:rgba(15,23,42,.75);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .messages{
      flex:1;
      padding:18px 18px 8px 18px;
      overflow:auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      transform: translateZ(0);
      backface-visibility: hidden;
      contain: layout paint;
      will-change: scroll-position;
    }

    .msg{display:flex;margin:10px 0;gap:10px;align-items:flex-start;}
    .avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(96,165,250,.18);border:1px solid var(--border);color:var(--accent);font-weight:700;flex:0 0 auto;}
    .bubble{max-width:820px;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:rgba(17,28,51,.78);line-height:1.55;white-space:pre-wrap;word-break:break-word;}
    .me .avatar{background:rgba(52,211,153,.16);color:var(--accent2);}
    .me .bubble{background:rgba(16,185,129,.10);border-color:rgba(52,211,153,.25);}

    .meta{color:var(--muted);font-size:12px;padding:0 18px 10px 18px;border-top:1px solid rgba(148,163,184,.10);background:rgba(15,23,42,.55);}
    .composer{padding:12px 12px 14px 12px;border-top:1px solid rgba(148,163,184,.16);background:rgba(15,23,42,.80);display:flex;gap:10px;align-items:flex-end;}
    textarea{flex:1;resize:none;min-height:44px;max-height:160px;padding:10px 12px;border-radius:12px;border:1px solid rgba(148,163,184,.22);background:rgba(2,6,23,.35);color:var(--text);outline:none;line-height:1.4;}
    textarea:focus{border-color:rgba(96,165,250,.55);box-shadow:0 0 0 4px rgba(96,165,250,.12);}
    .btn{padding:10px 14px;border-radius:12px;border:1px solid rgba(96,165,250,.45);background:rgba(96,165,250,.18);color:var(--text);cursor:pointer;font-weight:700;height:44px;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;}
    .btn:hover{filter:brightness(1.12);}
    .btn:disabled{opacity:.55;cursor:not-allowed;filter:none;}

    .quick-replies{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
    .qr-title{color:var(--muted);font-size:12px;margin-top:4px;margin-bottom:6px}
    .qbtn{
      padding:8px 12px;border-radius:999px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(2,6,23,.28);
      color:var(--text);
      cursor:pointer;
      font-weight:800;
      font-size:13px;
      line-height:1;
      white-space:nowrap;
      position:relative;
    }
    .qbtn:hover{filter:brightness(1.12);}
    .qbtn:disabled{opacity:.55;cursor:not-allowed;filter:none;}

    .brand-dock{
      position: sticky;
      bottom: 68px;
      margin: 0 12px 10px 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.78);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      display: none;
      z-index: 20;
      transform: translateZ(0);
      backface-visibility: hidden;
      contain: paint;
    }
    .brand-dock.on{ display:block; }
    .brand-dock .bd-title{ color: var(--text); font-weight: 900; margin-bottom: 6px; }
    .brand-dock .bd-desc{ white-space: pre-wrap; color: rgba(229,231,235,.92); font-size: 13px; }
    .brand-dock .bd-hint{ color: var(--muted); font-size: 12px; margin-top: 6px; }

    .navrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .linkbtn{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 12px;border-radius:999px;
      border:1px solid var(--border);
      background:rgba(15,23,42,.55);
      color:var(--muted);
      text-decoration:none;
      font-size:12px;
      font-weight:800;
    }
    .linkbtn:hover{filter:brightness(1.12);color:var(--text);}

    @media (max-width:700px){
      .layout{height:calc(100vh - 110px);}
      .bubble{max-width:100%;}
      .header{flex-direction:column;align-items:flex-start;}
      .brand-dock{ bottom: 76px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">电视选购 1.0 <span style="font-size:16px;font-weight:700;color:var(--muted)">（聊天入口）</span></h1>
        <p class="subtitle">流程：先点尺寸 → 再选价格区间 → 再选品牌（可选） → 再用途；也支持“重置”。</p>
        <div class="navrow" style="margin-top:10px;">
          <a class="linkbtn" href="/output">📷 去「对比度截图分析」</a>
        </div>
      </div>
      <div class="badge" id="stateBadge">已收集：暂无</div>
    </div>

    <div class="layout">
      <div class="messages" id="messages"></div>

      <div class="brand-dock" id="brandDock">
        <div class="bd-title"></div>
        <div class="bd-desc"></div>
        <div class="bd-hint">提示：点击品牌会自动发送“只看该品牌”。也可以点“不限定品牌”，或直接输入用途：ps5 / movie / bright。</div>
      </div>

      <div class="meta">Enter 发送，Shift+Enter 换行</div>

      <div class="composer">
        <textarea id="input" placeholder="加载中…" rows="1"></textarea>
        <button class="btn" id="sendBtn">发送</button>
      </div>
    </div>
  </div>

<script>
  // ===== State =====
  // 说明：增加 budget_min/budget_max（前端兜底过滤用；后端若支持也可直接利用）
  let state = {size:null, scene:null, budget:null, brand:null, budget_bucket:null, budget_min:null, budget_max:null};

  const $messages = document.getElementById('messages');
  const $input = document.getElementById('input');
  const $sendBtn = document.getElementById('sendBtn');
  const $stateBadge = document.getElementById('stateBadge');

  // ✅ 品牌介绍固定栏
  const $brandDock = document.getElementById('brandDock');
  function showBrandDock(title, desc){
    if(!$brandDock) return;
    if(!desc) return;
    $brandDock.querySelector('.bd-title').textContent = title || '';
    $brandDock.querySelector('.bd-desc').textContent = desc || '';
    $brandDock.classList.add('on');
  }
  function hideBrandDock(){
    if(!$brandDock) return;
    $brandDock.classList.remove('on');
  }
  // 点击空白处隐藏 dock（触屏更稳）
  document.addEventListener('click', (e) => {
    if(!$brandDock) return;
    if($brandDock.classList.contains('on') && !e.target.closest('#brandDock') && !e.target.closest('.qbtn')){
      hideBrandDock();
    }
  });

  // ✅ 固定尺寸
  const SIZE_OPTIONS = [43, 50, 55, 65, 75, 85, 98, 100, 115, 116];

  // ✅ 价格区间（前端写死；显示“xx%人选择”）
  const PRICE_BUCKETS = {
    43: [
      {range:"0-1200", percent:22},
      {range:"1200-1800", percent:34},
      {range:"1800-2500", percent:24},
      {range:"2500-3500", percent:14},
      {range:"3500+", percent:6},
    ],
    50: [
      {range:"0-2200", percent:20},
      {range:"2200-3000", percent:32},
      {range:"3000-4000", percent:26},
      {range:"4000-5500", percent:15},
      {range:"5500+", percent:7},
    ],
    55: [
      {range:"0-2800", percent:28},
      {range:"2800-3800", percent:30},
      {range:"3800-5000", percent:24},
      {range:"5000-7000", percent:12},
      {range:"7000+", percent:6},
    ],
    65: [
      {range:"0-3500", percent:18},
      {range:"3500-5000", percent:30},
      {range:"5000-7000", percent:26},
      {range:"7000-10000", percent:16},
      {range:"10000+", percent:10},
    ],
    75: [
      {range:"0-6000", percent:20},
      {range:"6000-8500", percent:30},
      {range:"8500-12000", percent:24},
      {range:"12000-18000", percent:16},
      {range:"18000+", percent:10},
    ],
    85: [
      {range:"0-7000", percent:6},
      {range:"7000-10000", percent:35},
      {range:"10000-14000", percent:30},
      {range:"14000-20000", percent:21},
      {range:"20000+", percent:8},
    ],
    98: [
      {range:"0-7000", percent:6},
      {range:"7000-18000", percent:38},
      {range:"18000-26000", percent:30},
      {range:"26000-40000", percent:18},
      {range:"40000+", percent:8},
    ],
    100: [
      {range:"0-8000", percent:16},
      {range:"8000-13000", percent:28},
      {range:"13000-18000", percent:26},
      {range:"18000-20000", percent:18},
      {range:"20000+", percent:12},
    ],
    115: [
      {range:"50000-62000", percent:22},
      {range:"62000-72000", percent:30},
      {range:"72000-82000", percent:24},
      {range:"82000-95000", percent:16},
      {range:"95000+", percent:8},
    ],
    116: [
      {range:"50000-62000", percent:22},
      {range:"62000-72000", percent:30},
      {range:"72000-82000", percent:24},
      {range:"82000-95000", percent:16},
      {range:"95000+", percent:8},
    ],
  };

  // ✅ 品牌按钮（略：保持你原来的 BRAND_OPTIONS 不变）
  const BRAND_OPTIONS = [
    { key:"海信", label:"海信", sendText:"只看海信", desc:`海信是国内综合实力较强的电视品牌之一，在 Mini LED 分区背光、整机系统整合和产品稳定性方面积累较深。\n其产品覆盖从中端到高端多个层级，注重在亮度、分区控光和画质调校之间取得平衡。\n整体技术路线偏向稳健与成熟，强调长期可靠性与产品完整度。` },
    { key:"TCL", label:"TCL", sendText:"只看TCL", desc:`TCL 是 Mini LED 技术的重要推动者之一，在分区数量、峰值亮度和硬件参数方面长期保持激进策略。\n其电视产品强调硬件规格优势，通过大量分区和高亮度提升控光能力和画面冲击力。\n在大尺寸显示和高动态内容中具备明显参数优势，整体技术风格偏向工程化和参数导向。` },
    { key:"Vidda", label:"Vidda", sendText:"只看Vidda", desc:`Vidda 是海信旗下的年轻化子品牌，产品策略以高亮度、高配置和价格竞争力为核心。\n其电视在同价位段中强调参数表现，通过简化产品线与线上渠道运作。\n形成偏向性能导向的品牌形象。` },
    { key:"雷鸟", label:"雷鸟（FFALCON）", sendText:"只看雷鸟", desc:`雷鸟是 TCL 旗下的互联网子品牌，产品以高分区数、高亮度和进攻性定价为主要特点。\n其电视强调硬件参数优势，主要面向线上市场。\n通过简化品牌溢价和渠道成本，在同价位段中形成较强的参数竞争力。` },
    { key:"创维", label:"创维", sendText:"只看创维", desc:`创维是国内较早布局 OLED 电视的品牌之一，同时在 LCD、Mini LED 等多条显示技术路线均有产品布局。\n其电视产品强调显示技术积累与画面舒适度，在不同技术方案之间保持并行发展。\n整体定位偏向中高端市场。` },
    { key:"小米", label:"小米", sendText:"只看小米", desc:`小米电视以高性价比和智能生态整合能力著称，强调配置与价格之间的竞争力。\n其电视产品通常与小米智能家居体系深度联动，功能完整，系统生态统一。\n在电视硬件之外更注重作为智能终端入口的角色定位。` },
    { key:"索尼", label:"索尼（Sony）", sendText:"只看索尼", desc:`索尼是电视领域中以画质调校和影像算法见长的高端品牌，核心优势源自其长期积累的影视制作与专业显示技术。\n索尼电视强调对画面内容的认知分析，通过 XR 认知芯片对人物、景物、光影进行分对象处理，使画面在色彩还原、层次过渡和细节表现上更接近电影原片风格。\n整体画面取向偏向真实、自然，而非单纯追求高亮度或夸张对比。` },
    { key:"三星", label:"三星（Samsung）", sendText:"只看三星", desc:`三星是全球电视出货量长期领先的品牌，在 Mini LED 与量子点显示技术上拥有成熟方案。\n其电视产品强调高亮度输出与稳定的色彩表现，画面风格明亮通透，在大尺寸和高动态范围内容中具有较强视觉冲击力。\n同时，三星在工业设计与整机制造方面经验丰富，产品外观与做工保持较高一致性。` },
    { key:"LG", label:"LG", sendText:"只看LG", desc:`LG 是 OLED 自发光显示技术的核心推动厂商之一，在 OLED 面板制造和整机应用方面占据重要地位。\n自发光像素结构使其电视具备极高对比度和纯净黑位表现，在暗场画面和光影层次呈现上优势明显。\nLG 电视整体画面风格偏向影院化，强调沉浸感与画面深度。` },
    { key:"长虹", label:"长虹", sendText:"只看长虹", desc:`长虹是国内老牌电视厂商，产品定位偏向务实和功能完整，覆盖价格区间较广。\n其电视产品注重基础显示性能与稳定使用体验，技术更新节奏相对稳健。\n在市场中以传统品牌形象和广泛覆盖能力长期存在。` },
    { key:"卡萨帝", label:"卡萨帝（Casarte）", sendText:"只看卡萨帝", desc:`卡萨帝是海尔旗下的高端家电品牌，电视产品定位于高端与品质取向，强调设计感、用料水平与整体家居环境的融合。\n其电视更注重显示稳定性、做工细节和整体观感的一致性，技术路线偏向成熟与稳健，突出高端品牌形象与产品质感表达。` },
    { key:"酷开", label:"酷开（Coocaa）", sendText:"只看酷开", desc:`酷开是创维旗下的互联网电视品牌，定位偏向年轻化与线上市场。\n其电视产品强调性价比与系统易用性，在硬件配置与价格之间保持竞争力，整体策略以规模化和快速迭代为主，突出互联网品牌属性` },
    { key:"追觅", label:"追觅（DREAME）", sendText:"只看追觅", desc:`追觅原本以智能清洁电器为核心业务，近年来开始尝试进入电视等显示设备领域。\n其电视产品延续品牌偏工程化与配置导向的思路，强调硬件规格和智能功能整合，目前整体仍处于新兴探索阶段` },
    { key:"海尔", label:"海尔（Haier）", sendText:"只看海尔", desc:`海尔在家电制造与渠道体系方面具备深厚积累，其电视产品更强调稳定性、系统整合能力以及家庭场景适配。\n整体技术路线偏成熟可靠，注重产品生命周期管理和品牌服务体系的完整性。` },
    { key:"荣耀", label:"荣耀（HONOR）", sendText:"只看荣耀", desc:`荣耀电视延续其在消费电子领域的产品思路，强调设计简洁、系统流畅与多设备协同体验。\n其电视产品在定位上偏向年轻化与智能体验导向，在显示技术上采取相对稳健的路线。` },
    { key:"华为", label:"华为（Huawei）", sendText:"只看华为", desc:`华为电视以“智慧屏”为核心定位，强调系统生态、分布式能力与多设备协同体验。\n其电视产品更侧重智能交互和系统层能力建设，在显示硬件层面采取相对保守而成熟的技术策略。` },
    { key:"康佳", label:"康佳（KONKA）", sendText:"只看康佳", desc:`康佳是国内传统电视厂商之一，长期覆盖入门到中端市场。\n其电视产品定位偏向实用型，强调基础显示能力、功能完整度与价格覆盖广度，整体风格稳健。` },
    { key:"松下", label:"松下（Panasonic）", sendText:"只看松下", desc:`松下在电视领域以专业显示技术和画面准确性见长，强调色彩还原的准确度与输出稳定性。\n其产品整体风格偏向工程化和专业显示取向，在影音显示领域拥有长期技术积累。` },
    { key:"飞利浦", label:"飞利浦（PHILIPS）", sendText:"只看飞利浦", desc:`飞利浦电视强调画面调校与环境氛围表现，部分产品引入环境光联动等差异化设计。\n整体定位偏中高端，注重在显示效果之外营造整体观影氛围。` },
    { key:"东芝", label:"东芝（TOSHIBA）", sendText:"只看东芝", desc:`东芝电视延续日系品牌一贯的工程化思路，强调显示稳定性、画面自然度和长期可靠性。\n在市场中以传统技术路线和品牌积累持续存在。` },
    { key:"小度", label:"小度（Xiaodu）", sendText:"只看小度", desc:`小度是百度旗下的智能硬件品牌，其电视产品强调语音交互和智能生态能力。\n显示硬件定位偏基础，核心价值更多集中在智能交互、内容与系统服务层面。` },
  ];

  function updateBadge(s){
    if(!s){ $stateBadge.textContent = '已收集：暂无'; return; }
    const parts = [];
    if(s.brand) parts.push(`品牌=${s.brand}`);
    if(s.budget_min !== null && s.budget_min !== undefined){
      const min = s.budget_min;
      const max = (s.budget_max === null || s.budget_max === undefined) ? '+' : s.budget_max;
      parts.push(`价格区间=${min}-${max}`);
    }else if(s.budget_bucket && s.budget_bucket !== 'skip'){
      parts.push(`价格区间=${s.budget_bucket}`);
    }
    if(s.size !== null && s.size !== undefined) parts.push(`尺寸=${s.size}寸`);
    if(s.scene) parts.push(`场景=${s.scene}`);
    $stateBadge.textContent = '已收集：' + (parts.length ? parts.join('，') : '暂无');
  }

  function autosize(){
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
  }

  // ===== 价格区间解析 + 前端兜底过滤 =====
  function parseBucketRange(str){
    const t = (str || '').trim();
    if(!t) return null;
    if(t === 'skip' || t === '不限预算' || t === '不筛价格') return {min:null, max:null, raw:'skip'};
    const m1 = t.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m1) return {min:Number(m1[1]), max:Number(m1[2]), raw:t};
    const m2 = t.match(/^(\d+)\s*\+$/);
    if(m2) return {min:Number(m2[1]), max:null, raw:t};
    return null;
  }

  function extractPriceFromLine(line){
    // 支持：￥7599 / ¥7599 / ¥ 7,599
    const m = line.match(/[￥¥]\s*([\d,]+)/);
    if(!m) return null;
    const n = Number(String(m[1]).replace(/,/g,''));
    return Number.isFinite(n) ? n : null;
  }

  function filterReplyByBudget(text){
    const min = state && state.budget_min !== undefined ? state.budget_min : null;
    const max = state && state.budget_max !== undefined ? state.budget_max : null;
    if(min === null && max === null) return text;

    const lines = String(text || '').split('\n');
    let removed = 0;

    const kept = lines.filter((ln) => {
      // 只过滤“候选列表”那类含价格的条目；其它说明行保留
      const p = extractPriceFromLine(ln);
      if(p === null) return true;

      if(min !== null && p < min){ removed++; return false; }
      if(max !== null && p > max){ removed++; return false; }
      return true;
    });

    if(removed > 0){
      const tag = `\n（前端已按价格区间过滤：${min === null ? '' : min}${max === null ? '+' : '-' + max}，已隐藏 ${removed} 条越界项）`;
      return kept.join('\n') + tag;
    }
    return kept.join('\n');
  }

  function addMsg(role, text, ui){
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'me' ? 'me' : 'bot');

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'me' ? '我' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text || '';

    if(role !== 'me' && ui){
      if(ui.type === 'size_select') renderSizeButtons(bubble);
      if(ui.type === 'price_select') renderPriceButtons(bubble, ui.size);
      if(ui.type === 'brand_select') renderBrandButtons(bubble);
    }

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    $messages.appendChild(wrap);
    $messages.scrollTop = $messages.scrollHeight;
  }

  function renderTitle(container, text){
    const title = document.createElement('div');
    title.className = 'qr-title';
    title.textContent = text;
    container.appendChild(title);
  }

  function renderSizeButtons(container){
    renderTitle(container, '请选择【尺寸】');
    const wrap = document.createElement('div');
    wrap.className = 'quick-replies';
    SIZE_OPTIONS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'qbtn';
      btn.type = 'button';
      btn.textContent = `${s}寸`;
      btn.addEventListener('click', () => sendText(`${s}寸`));
      wrap.appendChild(btn);
    });
    container.appendChild(wrap);
  }

  function renderPriceButtons(container, size){
    renderTitle(container, '请选择【价格区间】（点下面按钮）');
    const wrap = document.createElement('div');
    wrap.className = 'quick-replies';

    const buckets = PRICE_BUCKETS[Number(size)] || [];
    if(!buckets.length){
      const tip = document.createElement('div');
      tip.style.color = 'rgba(229,231,235,.9)';
      tip.style.fontSize = '13px';
      tip.textContent = '该尺寸暂无预设价格区间：你可以点「不限预算」或在输入框直接输入如 6000-8500 / 18000+';
      container.appendChild(tip);
    }

    buckets.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'qbtn';
      btn.type = 'button';
      btn.textContent = `${b.range}（${b.percent}%人选择）`;
      btn.addEventListener('click', () => sendText(b.range));
      wrap.appendChild(btn);
    });

    const skipBtn = document.createElement('button');
    skipBtn.className = 'qbtn';
    skipBtn.type = 'button';
    skipBtn.textContent = '不限预算（不筛价格）';
    skipBtn.addEventListener('click', () => sendText('skip'));
    wrap.appendChild(skipBtn);

    // ✅ 已删除「我手动输入预算」按钮（按你要求）

    container.appendChild(wrap);
  }

  function renderBrandButtons(container){
    renderTitle(container, '请选择【品牌】（可选）— 悬停查看介绍，点击进行筛选');
    const wrap = document.createElement('div');
    wrap.className = 'quick-replies';

    BRAND_OPTIONS.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'qbtn';
      btn.type = 'button';
      btn.textContent = opt.label;

      btn.addEventListener('mouseenter', () => showBrandDock(opt.label, opt.desc));
      btn.addEventListener('mouseleave', hideBrandDock);
      btn.addEventListener('touchstart', () => showBrandDock(opt.label, opt.desc), {passive:true});

      btn.addEventListener('click', () => sendText(opt.sendText));
      wrap.appendChild(btn);
    });

    const skip = document.createElement('button');
    skip.className = 'qbtn';
    skip.type = 'button';
    skip.textContent = '不限定品牌';
    skip.addEventListener('mouseenter', () => showBrandDock('不限定品牌', '不限制品牌，会在候选里按系统排序给 Top3。'));
    skip.addEventListener('mouseleave', hideBrandDock);
    skip.addEventListener('touchstart', () => showBrandDock('不限定品牌', '不限制品牌，会在候选里按系统排序给 Top3。'), {passive:true});
    skip.addEventListener('click', () => sendText('不限定品牌'));
    wrap.appendChild(skip);

    container.appendChild(wrap);
  }

  async function callChat(text){
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, state})
    });
    if(!resp.ok){
      const t = await resp.text();
      throw new Error('HTTP ' + resp.status + ': ' + t);
    }
    return await resp.json();
  }

  function syncInputHint(){
    if(state && state.size && state.budget_bucket){
      $input.placeholder = "输入用途/品牌… 例如：ps5 / movie / bright / 我只看TCL";
    }else if(state && state.size){
      $input.placeholder = "请先点价格区间按钮（或直接输入 7000-10000 / 3500+ / skip）…";
    }else{
      $input.placeholder = "请先点尺寸按钮…";
    }
  }

  function maybePromptNextUi(){
    if(!state.size){
      addMsg('bot', '请先选择【尺寸】（点下面按钮）。', {type:'size_select'});
      return;
    }
    if(state.size && !state.budget_bucket){
      addMsg('bot', '请选择【价格区间】（点下面按钮）。', {type:'price_select', size: state.size});
      return;
    }
    if(state.size && state.budget_bucket && !state.brand){
      addMsg('bot', '接下来（可选）：点击品牌进行筛选；或跳过直接输入用途：ps5 / movie / bright。', {type:'brand_select'});
      return;
    }
  }

  // 在发送前：如果用户输入的是价格区间，则前端同步 state.budget_min/max（用于过滤）
  function maybeUpdateBudgetRangeFromText(t){
    const r = parseBucketRange(t);
    if(!r) return;

    if(r.raw === 'skip'){
      state.budget_bucket = 'skip';
      state.budget_min = null;
      state.budget_max = null;
      state.budget = null;
      return;
    }

    state.budget_bucket = r.raw;
    state.budget_min = r.min;
    state.budget_max = r.max;
    state.budget = null;
  }

  async function sendText(text){
    const t = (text || '').trim();
    if(!t) return;

    // 若是选了尺寸，通常后端会重置预算；这里前端也做一次稳妥重置
    if(/^\d+\s*寸$/.test(t)){
      state.budget_bucket = null;
      state.budget_min = null;
      state.budget_max = null;
      state.budget = null;
      state.brand = null;
      state.scene = null;
    }

    maybeUpdateBudgetRangeFromText(t);

    hideBrandDock();
    addMsg('me', t, null);
    $sendBtn.disabled = true;

    try{
      const data = await callChat(t);
      if(data && data.state){
        // 合并后端 state，但保留我们前端的 budget_min/max（除非后端也给了）
        const ns = data.state;
        state = Object.assign({}, state, ns);
      }

      updateBadge(state);
      syncInputHint();

      const replyText = filterReplyByBudget((data.reply || '').trim() || '（无输出）');
      addMsg('bot', replyText, null);

      maybePromptNextUi();

    }catch(e){
      addMsg('bot', '⚠️ 请求失败：' + (e && e.message ? e.message : e), null);
    }finally{
      $sendBtn.disabled = false;
      $input.focus();
    }
  }

  async function send(){
    const text = ($input.value || '').trim();
    if(!text) return;
    $input.value = '';
    autosize();
    await sendText(text);
  }

  async function boot(){
    updateBadge(state);
    autosize();
    $input.focus();

    addMsg('bot', '请先选择【尺寸】（点下面按钮）。只要点一个尺寸，我再继续问预算区间/用途/品牌。', {type:'size_select'});
    syncInputHint();

    try{
      const data = await callChat("");
      if(data && data.state) state = Object.assign({}, state, data.state);
      updateBadge(state);
      syncInputHint();
    }catch(e){}
  }

  $input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });
  $input.addEventListener('input', autosize);
  $sendBtn.addEventListener('click', send);

  boot();
</script>
</body>
</html>
